<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div>
        <h1 class="title">AI Chat Assistant</h1>
        <p class="subtitle">Ask about this website or get quick answers.</p>
      </div>
    </header>

    <main class="chat-container">
      <div class="controls">
        <label for="model-select" class="model-label">Model</label>
        <select id="model-select" class="model-select" aria-label="Select model">
  <!-- Large Models -->
  <option value="google/gemma-3-27b-it:free">Google Gemma 3 27B ⭐</option>
  <option value="google/gemma-3-12b-it:free">Google Gemma 3 12B</option>
  

  <optgroup label="🏆 Best General">
    <option value="google/gemma-3-27b-it:free">Gemma 3 27B ⭐</option>
    <option value="google/gemma-3-12b-it:free">Gemma 3 12B</option>
    <option value="meta-llama/llama-3.3-8b-instruct:free">Llama 3.3 8B</option>
    <option value="qwen/qwen3-8b:free">Qwen 3 8B</option>
  </optgroup>

  <optgroup label="🧠 Reasoning">
    <option value="tencent/hy3:free">Tencent Hy3 (295B MoE)</option>
    <option value="deepseek/deepseek-r1-0528-qwen3-8b:free">DeepSeek R1 8B</option>
    <option value="liquid/lfm-2.5-1.2b-thinking:free">Liquid LFM2.5 Thinking</option>
  </optgroup>

  <optgroup label="💻 Coding">
    <option value="poolside/laguna-xs-2.1:free">Poolside Laguna XS 2.1</option>
  </optgroup>

  <optgroup label="⚡ Fast">
    <option value="google/gemma-3-4b-it:free">Gemma 3 4B</option>
    <option value="google/gemma-3-1b-it:free">Gemma 3 1B</option>
    <option value="qwen/qwen3-4b:free">Qwen 3 4B</option>
    <option value="qwen/qwen3-1.7b:free">Qwen 3 1.7B</option>
    <option value="liquid/lfm-2.5-1.2b-instruct:free">Liquid LFM2.5 Instruct</option>
  
  <!-- Medium Models -->
  <option value="google/gemma-3-4b-it:free">Google Gemma 3 4B</option>
  <option value="meta-llama/llama-3.3-8b-instruct:free">Llama 3.3 8B</option>
  <option value="qwen/qwen3-8b:free">Qwen 3 8B</option>

  <!-- Small/Fast Models -->
  <option value="google/gemma-3-1b-it:free">Gemma 3 1B (Fast)</option>
  <option value="qwen/qwen3-4b:free">Qwen 3 4B</option>
  <option value="qwen/qwen3-1.7b:free">Qwen 3 1.7B</option>
  <option value="microsoft/phi-4-reasoning-plus:free">Phi-4 Reasoning</option>

  <!-- Ultra Fast -->
  <option value="deepseek/deepseek-r1-0528-qwen3-8b:free">DeepSeek R1 8B</option>
</select>
      </div>

      <section id="chat-box" class="chat-box" role="log" aria-live="polite"></section>

      <form id="chat-form" class="input-area" action="#" autocomplete="off">
        <input id="user-input" name="message" class="user-input" type="text" placeholder="Type a message and press Enter" aria-label="Type a message">
        <button id="send-btn" class="send-btn" type="submit">Send</button>
      </form>
    </main>

    <footer class="app-footer">
      <small>Built for quick demos — responsive and accessible.</small>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
