<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div>
        <h1 class="title">AI Chat Assistant</h1>
        <p class="subtitle">Ask about this website or get quick answers.</p>
      </div>
    </header>

    <main class="chat-container">
      <div class="controls">
        <label for="model-select" class="model-label">Model</label>
        <select id="model-select" class="model-select" aria-label="Select model">
          <option value="google/gemma-2-9b-it:free">Google Gemma 2 9B (Recommended)</option>
          <option value="meta-llama/llama-3.2-3b-instruct:free">Meta Llama 3.2 3B</option>
          <option value="meta-llama/llama-3.2-1b-instruct:free">Meta Llama 3.2 1B (Fast)</option>
          <option value="qwen/qwen-2-7b-instruct:free">Qwen 2 7B</option>
          <option value="microsoft/phi-3-mini-128k-instruct:free">Microsoft Phi-3 Mini</option>
          <option value="mistralai/mistral-7b-instruct:free">Mistral 7B</option>
          <option value="meituan/longcat-flash-chat:free">Meituan LongCat Flash</option>
        </select>
      </div>

      <section id="chat-box" class="chat-box" role="log" aria-live="polite"></section>

      <form id="chat-form" class="input-area" action="#" autocomplete="off">
        <input id="user-input" name="message" class="user-input" type="text" placeholder="Type a message and press Enter" aria-label="Type a message">
        <button id="send-btn" class="send-btn" type="submit">Send</button>
      </form>
    </main>

    <footer class="app-footer">
      <small>Built for quick demos — responsive and accessible.</small>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
